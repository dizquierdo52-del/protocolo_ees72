<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mbo'ehao Pro - Gestión de Suplencias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --primary: #4f46e5;
            --danger: #ef4444;
            --success: #22c55e;
            --admin: #0f172a;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: all 0.3s ease; 
        }

        .row-active {
            background: linear-gradient(to right, #f8fafc, #ffffff);
            border-left: 6px solid var(--primary);
        }

        .admin-section {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .admin-section.show { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-overlay { 
            backdrop-filter: blur(10px); 
            display: none; 
            background: rgba(15, 23, 42, 0.6);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-overlay.active { display: flex; }

        .role-badge {
            font-size: 9px; padding: 2px 8px; border-radius: 99px; font-weight: 800; text-transform: uppercase;
        }
        .role-ADMIN { background: #fee2e2; color: #991b1b; }
        .role-AUXILIAR { background: #dcfce7; color: #166534; }
        
        .nov-tag { font-size: 8px; padding: 1px 5px; border-radius: 4px; font-weight: 800; }
        .tag-AUSENCIA { background: #fee2e2; color: #b91c1c; }
        .tag-LICENCIA { background: #e0e7ff; color: #4338ca; }
        .tag-TARDE { background: #fef3c7; color: #b45309; }

        .status-pill {
            font-size: 8px; font-weight: 900; padding: 4px 8px; border-radius: 6px; text-transform: uppercase;
            white-space: nowrap; display: inline-flex; align-items: center; gap: 4px;
        }
        .pill-licencia { background: #4338ca; color: white; }
        .pill-ausencia { background: #ef4444; color: white; }
        .pill-tardanza { background: #f59e0b; color: white; }

        .simulation-banner {
            background: linear-gradient(90deg, #1e293b, #334155);
            color: #94a3b8;
        }

        .suplente-tag {
            color: #059669;
            font-weight: 800;
            font-style: italic;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-20">

    <!-- Simulación de Día -->
    <div class="simulation-banner p-2 text-center text-[10px] font-bold flex justify-center items-center gap-4">
        <span class="flex items-center gap-1 uppercase tracking-wider text-indigo-400">
            <i data-lucide="test-tube-2" class="w-3 h-3"></i> Monitor Docente
        </span>
        <div class="flex items-center gap-2">
            <label for="simDaySelect">Simular día:</label>
            <select id="simDaySelect" onchange="renderTable()" class="bg-slate-800 text-white border-none rounded px-2 py-0.5 outline-none cursor-pointer">
                <option value="AUTO">HOY (AUTOMÁTICO)</option>
                <option value="LUNES">LUNES</option>
                <option value="MARTES">MARTES</option>
                <option value="MIERCOLES">MIÉRCOLES</option>
                <option value="JUEVES">JUEVES</option>
                <option value="VIERNES">VIERNES</option>
            </select>
        </div>
    </div>

    <!-- Barra de Navegación -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-40 p-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-lg">
                    <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight text-slate-800">Mbo'ehao <span class="text-indigo-600">Pro</span></h1>
                    <div class="flex items-center gap-2">
                        <span id="userStatus" class="text-[9px] text-slate-400 font-bold uppercase tracking-widest italic">Panel de Control</span>
                        <span id="sessionBadge" class="hidden"></span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right hidden sm:block">
                    <p id="currentDate" class="text-[10px] text-slate-400 font-bold uppercase"></p>
                    <p id="currentTime" class="text-xl font-black text-slate-800">00:00:00</p>
                </div>
                <button id="btnAuth" class="bg-slate-100 p-2.5 rounded-xl hover:bg-slate-200 transition-colors text-slate-600">
                    <i id="authIcon" data-lucide="lock" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 lg:p-8 space-y-8">
        
        <!-- PANEL DE ADMINISTRACIÓN -->
        <div id="adminModule" class="admin-section space-y-6">
            <div class="flex items-center justify-between border-b border-slate-200 pb-4">
                <h2 class="text-sm font-black text-slate-400 uppercase tracking-tighter flex items-center gap-2">
                    <i data-lucide="shield-check" class="w-4 h-4 text-indigo-500"></i> Gestión Administrativa
                </h2>
                <div class="flex gap-2">
                    <button id="btnExport" onclick="exportBackup()" class="hidden text-[10px] font-bold uppercase bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl hover:bg-indigo-100">Exportar Backup</button>
                    <button onclick="logout()" class="text-[10px] font-bold uppercase bg-red-50 text-red-600 px-4 py-2 rounded-xl hover:bg-red-100">Cerrar Sesión</button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <!-- Registro de Novedades -->
                <div class="lg:col-span-8 space-y-6">
                    <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                        <h3 class="text-xs font-black uppercase mb-4 text-slate-500">Registrar Novedad</h3>
                        <div class="grid grid-cols-1 md:grid-cols-5 gap-3 mb-4">
                            <div class="md:col-span-2">
                                <select id="admTeacher" class="w-full p-3 bg-slate-50 border rounded-xl text-xs font-bold" onchange="updateMateriaList()">
                                    <option value="">Seleccione un docente...</option>
                                </select>
                            </div>
                            <select id="admType" class="p-3 bg-slate-50 border rounded-xl text-xs font-bold" onchange="handleTypeChange()">
                                <option value="AUSENCIA">AUSENCIA</option>
                                <option value="TARDE">TARDANZA</option>
                                <option value="LICENCIA">LICENCIA</option>
                            </select>
                            <div class="flex flex-col">
                                <span class="text-[7px] font-black text-slate-400 uppercase ml-1">Fecha</span>
                                <input type="date" id="admDate" class="p-2.5 bg-slate-50 border rounded-xl text-xs font-bold">
                            </div>
                            <div id="dateUntilContainer" class="hidden flex flex-col">
                                <span class="text-[7px] font-black text-slate-400 uppercase ml-1">Hasta</span>
                                <input type="date" id="admDateUntil" class="p-2.5 bg-slate-50 border rounded-xl text-xs font-bold">
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                            <div class="flex flex-col gap-1">
                                <span class="text-[7px] font-black text-slate-400 uppercase ml-1">Alcance</span>
                                <select id="admScope" class="p-3 bg-slate-50 border rounded-xl text-xs font-bold" onchange="toggleScope()">
                                    <option id="optFull" value="FULL">TODA LA JORNADA</option>
                                    <option id="optPartial" value="PARTIAL">MÓDULO ESPECÍFICO</option>
                                </select>
                            </div>
                            <div id="partialSelect" class="flex flex-col gap-1 hidden">
                                <span class="text-[7px] font-black text-slate-400 uppercase ml-1">Módulo Específico</span>
                                <select id="admSpecific" class="w-full p-3 bg-indigo-50 border border-indigo-200 rounded-xl text-xs font-bold"></select>
                            </div>
                        </div>

                        <button onclick="saveNovelty()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black text-[10px] uppercase hover:bg-indigo-700 transition-all shadow-lg">Guardar Registro</button>
                    </div>

                    <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                        <h3 class="text-xs font-black uppercase mb-4 text-slate-500">Historial Reciente</h3>
                        <div class="overflow-x-auto max-h-64">
                            <table class="w-full text-left text-[11px]">
                                <thead class="sticky top-0 bg-white border-b border-slate-100 text-slate-400 font-black uppercase text-[9px]">
                                    <tr>
                                        <th class="py-3 px-2">Tipo</th>
                                        <th class="py-3 px-2">Docente</th>
                                        <th class="py-3 px-2">Periodo / Fecha</th>
                                        <th class="py-3 px-2 text-right">Acción</th>
                                    </tr>
                                </thead>
                                <tbody id="noveltyLogTable" class="divide-y divide-slate-50"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Perfiles y Datos -->
                <div class="lg:col-span-4 space-y-6">
                    <div id="sectionUsers" class="hidden bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                        <h3 class="text-xs font-black uppercase mb-4 text-slate-500">Gestión de Usuarios</h3>
                        <div class="space-y-2 mb-4">
                            <input type="text" id="nuName" placeholder="Usuario" class="w-full p-2.5 bg-slate-50 border rounded-xl text-xs font-bold">
                            <input type="password" id="nuPass" placeholder="Contraseña" class="w-full p-2.5 bg-slate-50 border rounded-xl text-xs font-bold">
                            <select id="nuProfile" class="w-full p-2.5 bg-slate-50 border rounded-xl text-xs font-bold">
                                <option value="ADMIN">ADMINISTRADOR</option>
                                <option value="AUXILIAR">AUXILIAR</option>
                            </select>
                            <button onclick="createUser()" class="w-full bg-slate-900 text-white p-2.5 rounded-xl font-black text-[9px] uppercase">Crear Nuevo</button>
                        </div>
                        <div class="max-h-32 overflow-y-auto divide-y text-[10px]" id="userListTable"></div>
                    </div>

                    <div id="sectionMaintenance" class="hidden bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                        <h3 class="text-xs font-black uppercase mb-4 text-slate-500">Mantenimiento</h3>
                        <div class="space-y-3">
                            <input type="file" id="importBackupFull" accept=".json" class="hidden">
                            <label for="importBackupFull" class="w-full bg-indigo-50 text-indigo-700 p-4 rounded-2xl flex flex-col items-center justify-center cursor-pointer border-2 border-indigo-100 text-center">
                                <i data-lucide="database-backup" class="w-5 h-5 mb-1"></i>
                                <span class="text-[9px] font-black uppercase">Importar Backup Full</span>
                            </label>
                            
                            <input type="file" id="importHorariosOnly" accept=".json" class="hidden">
                            <label for="importHorariosOnly" class="w-full bg-slate-50 border-2 border-dashed border-slate-200 p-4 rounded-2xl flex flex-col items-center justify-center cursor-pointer text-center">
                                <i data-lucide="file-spreadsheet" class="w-5 h-5 text-slate-400 mb-1"></i>
                                <span class="text-[9px] font-black text-slate-500 uppercase">Actualizar Horarios</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filtros del Dashboard -->
        <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-xl flex flex-col md:flex-row gap-4 items-center">
            <div class="flex-1 grid grid-cols-1 md:grid-cols-3 gap-4 w-full">
                <select id="filterCurso" class="p-3 bg-slate-50 border rounded-2xl text-xs font-extrabold outline-none">
                    <option value="ALL">TODOS LOS CURSOS</option>
                </select>
                <select id="filterProfesor" class="p-3 bg-slate-50 border rounded-2xl text-xs font-extrabold outline-none">
                    <option value="ALL">TODOS LOS DOCENTES</option>
                </select>
                <div class="relative">
                    <i data-lucide="search" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="globalSearch" placeholder="Buscar materia..." class="w-full pl-11 pr-4 py-3 bg-slate-50 border rounded-2xl text-xs font-extrabold outline-none">
                </div>
            </div>
            <div class="bg-slate-900 text-white px-6 py-3 rounded-2xl flex items-center gap-3">
                <i data-lucide="calendar" class="w-4 h-4 text-indigo-400"></i>
                <p id="dayBadge" class="text-xs font-black uppercase italic tracking-widest">---</p>
            </div>
        </div>

        <!-- Tabla Principal -->
        <div class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr class="text-[10px] uppercase font-black text-slate-400">
                            <th class="px-8 py-5">Horario</th>
                            <th class="px-8 py-5">Curso</th>
                            <th class="px-8 py-5">Materia</th>
                            <th class="px-8 py-5">Docente / Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Login -->
    <div id="loginModal" class="modal-overlay fixed inset-0 p-4">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-sm shadow-2xl border border-slate-100">
            <h2 class="text-xl font-black text-slate-800 uppercase text-center mb-6">Acceso</h2>
            <div class="space-y-4">
                <input type="text" id="loginUser" placeholder="Usuario" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-indigo-600">
                <input type="password" id="loginPass" placeholder="Contraseña" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-indigo-600">
                <button id="btnLogin" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black uppercase tracking-widest">Entrar</button>
                <button onclick="closeModals()" class="w-full text-slate-400 text-[10px] font-bold uppercase py-2">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const DIAS = { 0: "DOMINGO", 1: "LUNES", 2: "MARTES", 3: "MIERCOLES", 4: "JUEVES", 5: "VIERNES", 6: "SABADO" };
        const STORAGE_KEY = 'mboehao_v10_final';

        let db = {
            horarios: [],
            novedades: [],
            usuarios: [{ id: 1, user: 'admin', pass: 'admin123', profile: 'ADMIN' }],
            currentUser: null
        };

        window.onload = () => {
            loadStorage();
            updateClock();
            setInterval(updateClock, 1000);
            
            document.getElementById('btnAuth').onclick = () => db.currentUser ? toggleAdminUI() : document.getElementById('loginModal').classList.add('active');
            document.getElementById('btnLogin').onclick = login;
            document.getElementById('importBackupFull').onchange = (e) => handleFileImport(e, 'backup');
            document.getElementById('importHorariosOnly').onchange = (e) => handleFileImport(e, 'horarios');
            
            ['filterCurso', 'filterProfesor'].forEach(id => document.getElementById(id).onchange = renderTable);
            document.getElementById('globalSearch').oninput = renderTable;
            
            handleTypeChange();
            lucide.createIcons();
        };

        function loadStorage() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const parsed = JSON.parse(saved);
                db.horarios = parsed.horarios || [];
                db.novedades = (parsed.novedades || []).map(n => ({...n, id: n.id || Date.now()}));
                db.usuarios = parsed.usuarios || db.usuarios;
            }
            refreshUI();
        }

        function saveStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                horarios: db.horarios,
                novedades: db.novedades,
                usuarios: db.usuarios
            }));
        }

        function formatShortDate(isoString) {
            if(!isoString) return "";
            const [y, m, d] = isoString.split('-');
            return `${d}/${m}/${y.slice(-2)}`;
        }

        function normalizeCurso(n) { 
            if(!n) return "---";
            return n.toUpperCase()
                .replace('.DOCX', '').replace('.JSON', '').replace('PLANILLA', '').replace('PARTE', '')
                .trim();
        }

        function handleTypeChange() {
            const type = document.getElementById('admType').value;
            document.getElementById('dateUntilContainer').classList.toggle('hidden', type !== 'LICENCIA');
            document.getElementById('optPartial').disabled = (type === 'LICENCIA');
            if(type === 'LICENCIA') document.getElementById('admScope').value = 'FULL';
            toggleScope();
        }

        function toggleScope() {
            const scope = document.getElementById('admScope').value;
            document.getElementById('partialSelect').classList.toggle('hidden', scope === 'FULL');
        }

        function login() {
            const u = document.getElementById('loginUser').value.trim();
            const p = document.getElementById('loginPass').value.trim();
            const user = db.usuarios.find(x => x.user === u && x.pass === p);
            if (user) {
                db.currentUser = user;
                closeModals();
                updateAuthUI();
                applyPermissions();
                document.getElementById('adminModule').classList.add('show');
                populateAdminOptions();
                renderNoveltyLog();
                renderUserList();
            } else { toast("Credenciales Inválidas", "red"); }
        }

        function applyPermissions() {
            const isAdmin = db.currentUser?.profile === 'ADMIN';
            document.getElementById('sectionUsers').classList.toggle('hidden', !isAdmin);
            document.getElementById('sectionMaintenance').classList.toggle('hidden', !isAdmin);
            document.getElementById('btnExport').classList.toggle('hidden', !isAdmin);
        }

        function logout() { db.currentUser = null; location.reload(); }

        function updateAuthUI() {
            const u = db.currentUser;
            if(u) {
                document.getElementById('userStatus').textContent = u.user;
                const badge = document.getElementById('sessionBadge');
                badge.textContent = u.profile;
                badge.className = `role-badge role-${u.profile} block`;
                document.getElementById('authIcon').setAttribute('data-lucide', 'unlock');
                lucide.createIcons();
            }
        }

        function toggleAdminUI() { document.getElementById('adminModule').classList.toggle('show'); }

        function saveNovelty() {
            const t = document.getElementById('admTeacher').value;
            const d1 = document.getElementById('admDate').value;
            const d2 = document.getElementById('admDateUntil').value;
            const type = document.getElementById('admType').value;
            const scope = document.getElementById('admScope').value;
            const specificId = document.getElementById('admSpecific').value;
            
            if(!t || !d1) return toast("Complete los campos requeridos", "red");
            
            db.novedades.unshift({
                id: Date.now(), 
                docente: t, 
                date: d1,
                dateUntil: type === 'LICENCIA' ? (d2 || d1) : d1,
                type: type, 
                scopeType: scope,      
                specificId: specificId
            });

            saveStorage();
            renderTable();
            renderNoveltyLog();
            toast("Registro guardado correctamente");
        }

        function renderNoveltyLog() {
            const table = document.getElementById('noveltyLogTable');
            const isAdmin = db.currentUser?.profile === 'ADMIN';
            
            table.innerHTML = db.novedades.map(n => `
                <tr class="hover:bg-slate-50">
                    <td class="py-3 px-2"><span class="nov-tag tag-${n.type}">${n.type}</span></td>
                    <td class="py-3 px-2 font-black text-slate-700">${n.docente}</td>
                    <td class="py-3 px-2 text-[9px] uppercase font-bold text-indigo-500">
                        ${n.type === 'LICENCIA' ? `${formatShortDate(n.date)} al ${formatShortDate(n.dateUntil)}` : formatShortDate(n.date)}
                    </td>
                    <td class="py-3 px-2 text-right">
                        ${isAdmin ? `<button onclick="delNovelty(${n.id})" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-3 h-3"></i></button>` : ''}
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function delNovelty(id) {
            if(db.currentUser?.profile !== 'ADMIN') return;
            db.novedades = db.novedades.filter(n => n.id !== id);
            saveStorage();
            renderNoveltyLog();
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const now = new Date();
            const todayIso = now.toISOString().split('T')[0];
            const simDay = document.getElementById('simDaySelect').value;
            const currentDay = simDay === 'AUTO' ? DIAS[now.getDay()] : simDay;

            const fSearch = document.getElementById('globalSearch').value.toLowerCase();
            const fCurso = document.getElementById('filterCurso').value;
            const fProf = document.getElementById('filterProfesor').value;

            document.getElementById('dayBadge').textContent = currentDay;

            const filtered = db.horarios.filter(h => {
                const horaLiteral = (h.hora || "").toLowerCase();
                if (horaLiteral.includes("hora") || horaLiteral.includes("horario")) return false;
                if (!h.espacio_curricular || !h.profesor || h.profesor.trim() === "") return false;
                
                const diaH = (h.dia || "").toUpperCase();
                const dayMatch = diaH.includes(currentDay.substring(0,4));
                const searchMatch = (h.espacio_curricular || "").toLowerCase().includes(fSearch);
                const cursoMatch = fCurso === 'ALL' || normalizeCurso(h.archivo_origen) === fCurso;
                const profMatch = fProf === 'ALL' || h.profesor === fProf;
                return dayMatch && searchMatch && cursoMatch && profMatch;
            });

            tbody.innerHTML = filtered.map(item => {
                const isActive = checkTime(item.horario);
                
                // Buscar suplente en el JSON original
                const suplenteNombre = item.suplente || item.control_directivo || "";
                
                const novelty = db.novedades.find(n => {
                    const dMatch = (todayIso >= n.date && todayIso <= (n.dateUntil || n.date));
                    const pMatch = n.docente.trim() === item.profesor.trim();
                    const sMatch = (n.scopeType === 'FULL' || !n.scopeType || n.specificId == item.id);
                    return dMatch && pMatch && sMatch;
                });
                
                let rowStyle = "";
                let statusLabel = "";

                if (novelty) {
                    if (novelty.type === 'LICENCIA') {
                        rowStyle = "bg-indigo-50/50 border-l-4 border-indigo-500";
                        statusLabel = `
                            <div class="flex flex-col gap-0.5">
                                <span class="status-pill pill-licencia"><i data-lucide="info" class="w-3 h-3"></i> LICENCIA</span>
                                <span class="text-[7px] font-black text-indigo-400 uppercase ml-1">DEL ${formatShortDate(novelty.date)} AL ${formatShortDate(novelty.dateUntil)}</span>
                            </div>
                        `;
                    } else if (novelty.type === 'AUSENCIA') {
                        rowStyle = "bg-red-50/50 border-l-4 border-red-500";
                        statusLabel = `<span class="status-pill pill-ausencia"><i data-lucide="x-circle" class="w-3 h-3"></i> AUSENTE</span>`;
                    } else if (novelty.type === 'TARDE') {
                        rowStyle = "bg-amber-50/50 border-l-4 border-amber-500";
                        statusLabel = `<span class="status-pill pill-tardanza"><i data-lucide="clock" class="w-3 h-3"></i> TARDANZA</span>`;
                    }
                } else if (isActive) {
                    rowStyle = "row-active";
                    statusLabel = `<span class="text-[8px] font-black text-indigo-500 animate-pulse uppercase tracking-tighter">En clase ahora</span>`;
                }

                return `
                    <tr class="${rowStyle} hover:bg-slate-50 transition-all">
                        <td class="px-8 py-5">
                            <span class="text-xs font-black block text-slate-700">${item.hora}</span>
                            <span class="text-[9px] text-slate-400 font-mono italic">${item.horario}</span>
                        </td>
                        <td class="px-8 py-5">
                            <span class="bg-slate-100 text-slate-500 px-3 py-1 rounded-lg text-[9px] font-black uppercase">
                                ${normalizeCurso(item.archivo_origen)}
                            </span>
                        </td>
                        <td class="px-8 py-5">
                            <p class="text-xs font-bold text-slate-800 leading-tight">${item.espacio_curricular}</p>
                        </td>
                        <td class="px-8 py-5">
                            <div class="flex flex-col items-start gap-1">
                                <span class="text-xs font-black text-slate-800">
                                    ${item.profesor} 
                                    ${suplenteNombre ? `<span class="suplente-tag ml-1">(${suplenteNombre})</span>` : ''}
                                </span>
                                ${statusLabel}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
            lucide.createIcons();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('es-AR', { hour12: false });
            document.getElementById('currentDate').textContent = now.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });
            if(now.getSeconds() === 0) renderTable();
        }

        function checkTime(range) {
            if(!range || !range.includes(' a ')) return false;
            const [s, e] = range.toLowerCase().split(' a ');
            const now = new Date();
            const current = now.getHours() * 60 + now.getMinutes();
            const parse = (t) => {
                const parts = t.trim().replace('.',':').split(':');
                return parseInt(parts[0]) * 60 + (parts[1] ? parseInt(parts[1]) : 0);
            }
            return current >= parse(s) && current <= parse(e);
        }

        function refreshUI() {
            const rawProfs = db.horarios.map(h => h.profesor).filter(p => p && p.trim() !== "");
            const cursos = [...new Set(db.horarios.map(h => normalizeCurso(h.archivo_origen)))].filter(c => c !== "---").sort();
            const profs = [...new Set(rawProfs)].sort();
            
            document.getElementById('filterCurso').innerHTML = '<option value="ALL">TODOS LOS CURSOS</option>' + cursos.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('filterProfesor').innerHTML = '<option value="ALL">TODOS LOS DOCENTES</option>' + profs.map(p => `<option value="${p}">${p}</option>`).join('');
            renderTable();
        }

        function createUser() {
            if(db.currentUser?.profile !== 'ADMIN') return;
            const name = document.getElementById('nuName').value.trim();
            const pass = document.getElementById('nuPass').value.trim();
            const prof = document.getElementById('nuProfile').value;
            if(!name || !pass) return toast("Faltan datos", "red");
            db.usuarios.push({ id: Date.now(), user: name, pass: pass, profile: prof });
            saveStorage();
            renderUserList();
            toast("Usuario creado");
        }

        function renderUserList() {
            const list = document.getElementById('userListTable');
            const isAdmin = db.currentUser?.profile === 'ADMIN';
            list.innerHTML = db.usuarios.map(u => `
                <div class="flex justify-between items-center py-1.5 group">
                    <span class="font-bold text-slate-600 text-[9px] uppercase tracking-wide">${u.user} (${u.profile})</span>
                    ${isAdmin && u.user !== 'admin' ? `<button onclick="delUser(${u.id})" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"><i data-lucide="trash-2" class="w-3 h-3"></i></button>` : ''}
                </div>
            `).join('');
            lucide.createIcons();
        }

        function delUser(id) {
            if(db.currentUser?.profile !== 'ADMIN') return;
            db.usuarios = db.usuarios.filter(u => u.id !== id);
            saveStorage();
            renderUserList();
        }

        function updateMateriaList() {
            const t = document.getElementById('admTeacher').value;
            const list = db.horarios.filter(h => h.profesor === t);
            const select = document.getElementById('admSpecific');
            select.innerHTML = list.map(h => `<option value="${h.id}">${h.hora} - ${h.espacio_curricular} (${normalizeCurso(h.archivo_origen)})</option>`).join('');
        }

        function populateAdminOptions() {
            const rawProfs = db.horarios.map(h => h.profesor).filter(p => p && p.trim() !== "");
            const profs = [...new Set(rawProfs)].sort();
            document.getElementById('admTeacher').innerHTML = '<option value="">Seleccione el profesor...</option>' + profs.map(p => `<option value="${p}">${p}</option>`).join('');
        }

        function handleFileImport(e, mode) {
            if(db.currentUser?.profile !== 'ADMIN') return;
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (mode === 'backup') {
                        db = {...data, currentUser: db.currentUser};
                        db.novedades = (db.novedades || []).map(n => ({...n, id: n.id || Date.now()}));
                        saveStorage();
                        refreshUI();
                        populateAdminOptions();
                        renderNoveltyLog();
                        renderUserList();
                        toast("SISTEMA RESTAURADO");
                    } else {
                        let imported = Array.isArray(data) ? data : (data.horarios || []);
                        imported = imported.filter(h => {
                            const val = (h.hora || h.horario || "").toLowerCase();
                            return !val.includes("hora") && !val.includes("horario");
                        });
                        
                        db.horarios = imported.map(h => ({...h, id: h.id || Math.random().toString(36).substr(2, 9)}));
                        saveStorage();
                        refreshUI();
                        populateAdminOptions();
                        toast("PLANILLA ACTUALIZADA");
                    }
                } catch(err) { toast("Error en formato JSON", "red"); }
            };
            reader.readAsText(file);
        }

        function exportBackup() {
            if(db.currentUser?.profile !== 'ADMIN') return;
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", `backup_mboehao_v10.json`);
            dlAnchorElem.click();
        }

        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }

        function toast(msg, color = "indigo") {
            const t = document.createElement('div');
            t.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl ${color === 'red' ? 'bg-red-600' : 'bg-slate-900'} text-white font-black text-[10px] uppercase z-[100] shadow-2xl transition-all duration-300 transform scale-110`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                setTimeout(() => t.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
